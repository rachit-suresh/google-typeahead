version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: typeahead-postgres
    ports:
      - "5433:5432" # Maps host port 5433 to container port 5432 to avoid collision with host postgres on 5432
    environment:
      - POSTGRES_DB=typeahead_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=18112006
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis-node-1:
    image: redis:7.2-alpine
    container_name: typeahead-redis-1
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  redis-node-2:
    image: redis:7.2-alpine
    container_name: typeahead-redis-2
    ports:
      - "6380:6379" # Maps host 6380 to container 6379
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  redis-node-3:
    image: redis:7.2-alpine
    container_name: typeahead-redis-3
    ports:
      - "6381:6379" # Maps host 6381 to container 6379
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  typeahead-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: typeahead-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis-node-1
      - redis-node-2
      - redis-node-3
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/typeahead_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=18112006
      - TYPEAHEAD_CACHE_NODES_0_NAME=Redis-Node-1
      - TYPEAHEAD_CACHE_NODES_0_HOST=redis-node-1
      - TYPEAHEAD_CACHE_NODES_0_PORT=6379
      - TYPEAHEAD_CACHE_NODES_1_NAME=Redis-Node-2
      - TYPEAHEAD_CACHE_NODES_1_HOST=redis-node-2
      - TYPEAHEAD_CACHE_NODES_1_PORT=6379
      - TYPEAHEAD_CACHE_NODES_2_NAME=Redis-Node-3
      - TYPEAHEAD_CACHE_NODES_2_HOST=redis-node-3
      - TYPEAHEAD_CACHE_NODES_2_PORT=6379

  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: search-microservice
    ports:
      - "8081:8081"
    depends_on:
      - typeahead-service
    environment:
      - TYPEAHEAD_SERVICE_URL=http://typeahead-service:8080

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-client
    ports:
      - "5173:5173"
    depends_on:
      - search-service
      - typeahead-service
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres-data:
